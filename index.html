<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FuchsChat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0e;
    --surface: #15161b;
    --surface-2: #1c1e25;
    --surface-3: #242731;
    --border: #262832;
    --text: #edeef1;
    --text-muted: #888c96;
    --accent: #7c6fee;
    --accent-strong: #6455e0;
    --accent-soft: rgba(124, 111, 238, 0.14);
    --danger: #e5484d;
    --danger-soft: rgba(229, 72, 77, 0.12);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(1000px 480px at 50% -8%, rgba(124,111,238,0.10), transparent), var(--bg);
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
    overflow: hidden;
  }

  .app-container {
    width: 100%;
    max-width: 1100px;
    height: 92vh;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  }

  /* --- AUTH SCREEN --- */
  #authView {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 24px;
  }

  .auth-card {
    width: 100%;
    max-width: 380px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 28px;
  }

  .brand-title {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    justify-content: center;
  }

  .brand-mark {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--accent-soft);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 1.1rem;
  }

  .brand-title h1 {
    font-size: 1.4rem;
    font-weight: 800;
    margin: 0;
  }

  .auth-tabs {
    display: flex;
    gap: 8px;
    background: var(--bg);
    padding: 4px;
    border-radius: 10px;
    margin-bottom: 20px;
  }

  .auth-tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    background: none;
    border: none;
    color: var(--text-muted);
    font-weight: 600;
    font-size: 0.85rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .auth-tab.active {
    background: var(--surface-2);
    color: var(--text);
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .form-group input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 14px;
    border-radius: 10px;
    font-size: 0.9rem;
  }

  .form-group input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .auth-error {
    color: var(--danger);
    background: var(--danger-soft);
    border: 1px solid rgba(229, 72, 77, 0.3);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 0.8rem;
    margin-bottom: 16px;
    display: none;
    text-align: center;
  }

  .primary-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    font-size: 0.92rem;
    font-weight: 700;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background .15s ease;
  }

  .primary-btn:hover { background: var(--accent-strong); }
  .primary-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  /* --- CHAT MAIN VIEW --- */
  #mainView {
    display: none;
    flex: 1;
    height: 100%;
  }

  #mainView.active { display: flex; }

  /* Sidebar */
  .sidebar {
    width: 300px;
    background: var(--surface-2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }

  .user-bar {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .user-info {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    font-size: 0.9rem;
  }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--accent-soft);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    flex-shrink: 0;
  }

  .icon-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.8rem;
    padding: 6px;
    border-radius: 6px;
  }

  .icon-btn:hover { color: var(--danger); background: var(--danger-soft); }

  .section-title {
    padding: 14px 16px 6px;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .action-link {
    color: var(--accent);
    cursor: pointer;
    text-transform: none;
    font-size: 0.75rem;
  }

  .chat-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .chat-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    margin-bottom: 2px;
    transition: background .15s ease;
  }

  .chat-item:hover, .chat-item.active {
    background: var(--surface-3);
  }

  .chat-item-name {
    font-size: 0.88rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Chat Area */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }

  .chat-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .chat-title {
    font-size: 1rem;
    font-weight: 700;
  }

  .chat-sub {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .messages-feed {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .msg-card {
    display: flex;
    flex-direction: column;
    max-width: 70%;
  }

  .msg-card.mine {
    align-self: flex-end;
  }

  .msg-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .msg-card.mine .msg-meta {
    justify-content: flex-end;
  }

  .msg-bubble {
    background: var(--surface-2);
    border: 1px solid var(--border);
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 0.9rem;
    line-height: 1.45;
    word-break: break-word;
  }

  .msg-card.mine .msg-bubble {
    background: var(--accent);
    color: #fff;
    border: none;
  }

  .msg-img {
    max-width: 100%;
    max-height: 250px;
    border-radius: 8px;
    margin-top: 6px;
    display: block;
  }

  /* Composer */
  .chat-composer {
    padding: 12px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .composer-tools {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .tool-btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 0.8rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .tool-btn:hover { border-color: var(--accent); }

  .input-row {
    display: flex;
    gap: 8px;
  }

  .input-row textarea {
    flex: 1;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 0.9rem;
    resize: none;
    height: 42px;
    max-height: 100px;
  }

  .input-row textarea:focus { outline: none; border-color: var(--accent); }

  .send-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 0 18px;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
  }

  /* Modals */
  .modal-overlay {
    position: fixed;
    top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .modal-overlay.active { display: flex; }

  .modal-content {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    width: 90%;
    max-width: 400px;
  }

  .modal-title {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 16px;
  }

  .empty-state {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.85rem;
    margin: auto;
  }

  /* Emoji Popover */
  .emoji-picker {
    display: none;
    position: absolute;
    bottom: 70px;
    left: 20px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    z-index: 10;
  }

  .emoji-picker.active { display: grid; }
  .emoji-item {
    font-size: 1.2rem;
    cursor: pointer;
    text-align: center;
    padding: 4px;
    border-radius: 6px;
  }
  .emoji-item:hover { background: var(--surface-3); }

  .preview-bar {
    display: none;
    align-items: center;
    gap: 8px;
    background: var(--surface-2);
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 0.8rem;
  }
  .preview-bar.active { display: flex; }
</style>
</head>
<body>

<div class="app-container">
  <div id="authView">
    <div class="auth-card">
      <div class="brand-title">
        <div class="brand-mark">F</div>
        <h1>FuchsChat</h1>
      </div>

      <div class="auth-tabs">
        <button type="button" class="auth-tab active" id="tabLogin">Anmelden</button>
        <button type="button" class="auth-tab" id="tabRegister">Registrieren</button>
      </div>

      <div class="auth-error" id="authError"></div>

      <form id="authForm">
        <div class="form-group">
          <label>Benutzername</label>
          <input type="text" id="authUsername" placeholder="z. B. Fuchs23" required autocomplete="off">
        </div>
        <div class="form-group">
          <label>Passwort</label>
          <input type="password" id="authPassword" placeholder="••••••••" required>
        </div>
        <button type="submit" class="primary-btn" id="authSubmitBtn">Anmelden</button>
      </form>
    </div>
  </div>

  <div id="mainView">
    <div class="sidebar">
      <div class="user-bar">
        <div class="user-info">
          <div class="avatar" id="myAvatar">--</div>
          <span id="myUsername">User</span>
        </div>
        <button type="button" class="icon-btn" id="logoutBtn" title="Abmelden">Abmelden</button>
      </div>

      <div class="section-title">
        <span>Direktnachrichten</span>
        <span class="action-link" id="addFriendBtn">+ Freund</span>
      </div>
      <div class="chat-list" id="dmList"></div>

      <div class="section-title">
        <span>Gruppen</span>
        <span class="action-link" id="createGroupBtn">+ Gruppe</span>
      </div>
      <div class="chat-list" id="groupList"></div>
    </div>

    <div class="chat-area">
      <div class="chat-header">
        <div>
          <div class="chat-title" id="activeChatTitle">Wähle einen Chat</div>
          <div class="chat-sub" id="activeChatSub">Nachrichten werden nach 24 Stunden gelöscht</div>
        </div>
      </div>

      <div class="messages-feed" id="msgFeed">
        <div class="empty-state">Wähle einen Freund oder eine Gruppe aus, um zu chatten.</div>
      </div>

      <div class="emoji-picker" id="emojiPicker"></div>

      <div class="chat-composer" style="position:relative;">
        <div class="preview-bar" id="mediaPreview">
          <span id="previewLabel">Anhang bereit</span>
          <button type="button" class="icon-btn" id="clearMediaBtn">✕</button>
        </div>

        <div class="composer-tools">
          <button class="tool-btn" type="button" id="emojiToggleBtn">😀 Emoji</button>
          <button class="tool-btn" type="button" id="imgUploadBtn">📷 Bild</button>
          <button class="tool-btn" type="button" id="gifBtn">👾 GIF</button>
          <input type="file" id="fileInput" accept="image/*" style="display:none;">
        </div>

        <form id="composerForm" class="input-row">
          <textarea id="msgInput" placeholder="Schreibe eine Nachricht..." disabled></textarea>
          <button class="send-btn" type="submit" id="sendBtn" disabled>Senden</button>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="addFriendModal">
  <div class="modal-content">
    <div class="modal-title">Freund hinzufügen</div>
    <div class="form-group">
      <label>Benutzername eingeben</label>
      <input type="text" id="friendNameInput" placeholder="z. B. MaxMustermann">
    </div>
    <div style="display:flex; gap:8px; justify-content:flex-end;">
      <button type="button" class="tool-btn" id="closeFriendModal">Abbrechen</button>
      <button type="button" class="primary-btn" style="width:auto;" id="confirmAddFriend">Hinzufügen</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="createGroupModal">
  <div class="modal-content">
    <div class="modal-title">Gruppe erstellen</div>
    <div class="form-group">
      <label>Gruppenname</label>
      <input type="text" id="groupNameInput" placeholder="z. B. Gaming Runde">
    </div>
    <div class="form-group">
      <label>Mitglieder auswählen</label>
      <div id="friendsChecklist" style="max-height:150px; overflow-y:auto; display:flex; flex-direction:column; gap:6px;"></div>
    </div>
    <div style="display:flex; gap:8px; justify-content:flex-end;">
      <button type="button" class="tool-btn" id="closeGroupModal">Abbrechen</button>
      <button type="button" class="primary-btn" style="width:auto;" id="confirmCreateGroup">Erstellen</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion, onSnapshot, collection, query, where, getDocs
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ---------------------------------------------------------------
  // Firebase Configuration
  // ---------------------------------------------------------------
  const firebaseConfig = {
    apiKey: "AIzaSyA5xo-f4aF5NW-TgSnTxNXui_9WDNZFefk",
    authDomain: "fuchschat.firebaseapp.com",
    projectId: "fuchschat",
    storageBucket: "fuchschat.firebasestorage.app",
    messagingSenderId: "45069870516",
    appId: "1:45069870516:web:67b50eda906d69d7823ee1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const MSG_TTL = 24 * 60 * 60 * 1000; // 24 Stunden in Millisekunden

  // App State
  let currentUser = null;
  let activeChatId = null;
  let activeChatType = null;
  let chatUnsubscribe = null;
  let pendingImageBase64 = null;
  let isLoginTab = true;

  // DOM Elements
  const authView = document.getElementById('authView');
  const mainView = document.getElementById('mainView');
  const authForm = document.getElementById('authForm');
  const authUsername = document.getElementById('authUsername');
  const authPassword = document.getElementById('authPassword');
  const authError = document.getElementById('authError');
  const tabLogin = document.getElementById('tabLogin');
  const tabRegister = document.getElementById('tabRegister');
  const authSubmitBtn = document.getElementById('authSubmitBtn');

  const myUsernameEl = document.getElementById('myUsername');
  const myAvatarEl = document.getElementById('myAvatar');
  const dmList = document.getElementById('dmList');
  const groupList = document.getElementById('groupList');
  const msgFeed = document.getElementById('msgFeed');
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  const composerForm = document.getElementById('composerForm');

  const addFriendBtn = document.getElementById('addFriendBtn');
  const createGroupBtn = document.getElementById('createGroupBtn');
  const addFriendModal = document.getElementById('addFriendModal');
  const createGroupModal = document.getElementById('createGroupModal');
  const friendNameInput = document.getElementById('friendNameInput');
  const groupNameInput = document.getElementById('groupNameInput');
  const friendsChecklist = document.getElementById('friendsChecklist');

  const fileInput = document.getElementById('fileInput');
  const imgUploadBtn = document.getElementById('imgUploadBtn');
  const gifBtn = document.getElementById('gifBtn');
  const emojiToggleBtn = document.getElementById('emojiToggleBtn');
  const emojiPicker = document.getElementById('emojiPicker');
  const mediaPreview = document.getElementById('mediaPreview');
  const previewLabel = document.getElementById('previewLabel');

  function showError(msg) {
    if (msg) {
      authError.textContent = msg;
      authError.style.display = 'block';
    } else {
      authError.style.display = 'none';
    }
  }

  // Sicheres Passwort-Hashing (funktioniert auch lokal auf HTTP)
  async function hashPassword(pw) {
    if (window.crypto && crypto.subtle) {
      const encoder = new TextEncoder();
      const data = encoder.encode(pw);
      const hash = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }
    let hash = 0;
    for (let i = 0; i < pw.length; i++) {
      hash = ((hash << 5) - hash) + pw.charCodeAt(i);
      hash |= 0;
    }
    return 'fallback_' + Math.abs(hash).toString(16);
  }

  // Tab Wechsel
  tabLogin.addEventListener('click', () => {
    isLoginTab = true;
    tabLogin.classList.add('active');
    tabRegister.classList.remove('active');
    authSubmitBtn.textContent = 'Anmelden';
    showError('');
  });

  tabRegister.addEventListener('click', () => {
    isLoginTab = false;
    tabRegister.classList.add('active');
    tabLogin.classList.remove('active');
    authSubmitBtn.textContent = 'Registrieren';
    showError('');
  });

  // Login / Registrieren
  authForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    showError('');

    const username = authUsername.value.trim();
    const password = authPassword.value;

    if (!username || !password) {
      showError('Bitte Benutzername und Passwort eingeben.');
      return;
    }

    authSubmitBtn.disabled = true;
    authSubmitBtn.textContent = 'Bitte warten...';

    try {
      const userRef = doc(db, 'users', username.toLowerCase());
      const hashed = await hashPassword(password);

      if (isLoginTab) {
        const snap = await getDoc(userRef);
        if (!snap.exists()) {
          showError('Dieser Benutzer existiert nicht. Bitte zuerst registrieren!');
          return;
        }
        if (snap.data().passwordHash !== hashed) {
          showError('Falsches Passwort!');
          return;
        }
        loginUser(snap.data());
      } else {
        const snap = await getDoc(userRef);
        if (snap.exists()) {
          showError('Dieser Benutzername ist bereits vergeben.');
          return;
        }
        const userData = { username, passwordHash: hashed, friends: [] };
        await setDoc(userRef, userData);
        loginUser(userData);
      }
    } catch (err) {
      console.error(err);
      showError('Fehler: ' + (err.message || 'Verbindung fehlgeschlagen. Prüfe deine Firestore-Regeln.'));
    } finally {
      authSubmitBtn.disabled = false;
      authSubmitBtn.textContent = isLoginTab ? 'Anmelden' : 'Registrieren';
    }
  });

  function loginUser(userData) {
    currentUser = userData;
    myUsernameEl.textContent = currentUser.username;
    myAvatarEl.textContent = currentUser.username.slice(0, 2).toUpperCase();
    authView.style.display = 'none';
    mainView.classList.add('active');
    loadSidebarData();
    listenUserDocUpdates();
  }

  document.getElementById('logoutBtn').addEventListener('click', () => {
    location.reload();
  });

  function listenUserDocUpdates() {
    onSnapshot(doc(db, 'users', currentUser.username.toLowerCase()), (snap) => {
      if (snap.exists()) {
        currentUser = snap.data();
        loadSidebarData();
      }
    });
  }

  // Sidebar laden
  async function loadSidebarData() {
    dmList.innerHTML = '';
    (currentUser.friends || []).forEach(friend => {
      const item = document.createElement('div');
      item.className = 'chat-item';
      const dmId = getDmId(currentUser.username, friend);
      if (activeChatId === dmId) item.classList.add('active');

      item.innerHTML = `
        <div class="avatar">${friend.slice(0,2).toUpperCase()}</div>
        <div class="chat-item-name">${friend}</div>
      `;
      item.onclick = () => openChat(dmId, friend, 'dm');
      dmList.appendChild(item);
    });

    groupList.innerHTML = '';
    try {
      const q = query(collection(db, 'chats'), where('type', '==', 'group'), where('members', 'array-contains', currentUser.username));
      const snaps = await getDocs(q);
      snaps.forEach(gDoc => {
        const g = gDoc.data();
        const item = document.createElement('div');
        item.className = 'chat-item';
        if (activeChatId === gDoc.id) item.classList.add('active');

        item.innerHTML = `
          <div class="avatar" style="background:var(--surface-3); color:var(--text);">#</div>
          <div class="chat-item-name">${g.name}</div>
        `;
        item.onclick = () => openChat(gDoc.id, g.name, 'group');
        groupList.appendChild(item);
      });
    } catch(e) { console.error("Gruppen konnten nicht geladen werden:", e); }
  }

  function getDmId(userA, userB) {
    const sorted = [userA.toLowerCase(), userB.toLowerCase()].sort();
    return `dm_${sorted[0]}_${sorted[1]}`;
  }

  // Chat öffnen
  async function openChat(chatId, title, type) {
    activeChatId = chatId;
    activeChatType = type;
    document.getElementById('activeChatTitle').textContent = title;
    msgInput.disabled = false;
    sendBtn.disabled = false;

    if (chatUnsubscribe) chatUnsubscribe();

    const chatRef = doc(db, 'chats', chatId);
    const snap = await getDoc(chatRef);

    if (!snap.exists() && type === 'dm') {
      await setDoc(chatRef, { type: 'dm', members: [currentUser.username, title], messages: [] });
    }

    chatUnsubscribe = onSnapshot(chatRef, (docSnap) => {
      if (!docSnap.exists()) return;
      const data = docSnap.data();
      const validMsgs = (data.messages || []).filter(m => (Date.now() - m.timestamp) < MSG_TTL);
      renderMessages(validMsgs);
    });

    loadSidebarData();
  }

  function renderMessages(messages) {
    msgFeed.innerHTML = '';
    if (messages.length === 0) {
      msgFeed.innerHTML = '<div class="empty-state">Noch keine Nachrichten in den letzten 24 Stunden.</div>';
      return;
    }

    messages.sort((a,b) => a.timestamp - b.timestamp).forEach(m => {
      const isMine = m.author.toLowerCase() === currentUser.username.toLowerCase();
      const card = document.createElement('div');
      card.className = `msg-card ${isMine ? 'mine' : ''}`;

      const time = new Date(m.timestamp).toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
      card.innerHTML = `
        <div class="msg-meta"><b>${m.author}</b> • ${time}</div>
        <div class="msg-bubble">
          ${m.text ? `<div>${m.text}</div>` : ''}
          ${m.image ? `<img src="${m.image}" class="msg-img">` : ''}
        </div>
      `;
      msgFeed.appendChild(card);
    });

    msgFeed.scrollTop = msgFeed.scrollHeight;
  }

  // Nachrichten senden
  composerForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!activeChatId) return;

    const text = msgInput.value.trim();
    if (!text && !pendingImageBase64) return;

    try {
      const chatRef = doc(db, 'chats', activeChatId);
      const snap = await getDoc(chatRef);
      const data = snap.exists() ? snap.data() : { messages: [] };

      const validMsgs = (data.messages || []).filter(m => (Date.now() - m.timestamp) < MSG_TTL);
      validMsgs.push({
        id: Date.now() + '-' + Math.random().toString(36).slice(2,6),
        author: currentUser.username,
        text: text,
        image: pendingImageBase64 || null,
        timestamp: Date.now()
      });

      await updateDoc(chatRef, { messages: validMsgs });
      msgInput.value = '';
      clearMedia();
    } catch(err) {
      alert('Senden fehlgeschlagen: ' + err.message);
    }
  });

  // Bild-Upload
  imgUploadBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (event) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const maxDim = 600;
        let w = img.width, h = img.height;
        if (w > h && w > maxDim) { h = Math.round((h * maxDim) / w); w = maxDim; }
        else if (h > maxDim) { w = Math.round((w * maxDim) / h); h = maxDim; }

        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        pendingImageBase64 = canvas.toDataURL('image/jpeg', 0.7);

        previewLabel.textContent = `Bild gewählt (${file.name})`;
        mediaPreview.classList.add('active');
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  });

  // GIF Picker
  gifBtn.addEventListener('click', () => {
    const gifUrl = prompt("Füge eine GIF-Bild URL ein:");
    if (gifUrl) {
      pendingImageBase64 = gifUrl;
      previewLabel.textContent = "GIF angehängt";
      mediaPreview.classList.add('active');
    }
  });

  function clearMedia() {
    pendingImageBase64 = null;
    mediaPreview.classList.remove('active');
    fileInput.value = '';
  }
  document.getElementById('clearMediaBtn').addEventListener('click', clearMedia);

  // Emojis
  const popularEmojis = ['😀','😂','😍','🔥','👍','🎉','🚀','❤️','💀','💩','✨','😎','🙏','💯'];
  popularEmojis.forEach(emoji => {
    const item = document.createElement('div');
    item.className = 'emoji-item';
    item.textContent = emoji;
    item.onclick = () => {
      msgInput.value += emoji;
      emojiPicker.classList.remove('active');
      msgInput.focus();
    };
    emojiPicker.appendChild(item);
  });

  emojiToggleBtn.addEventListener('click', () => emojiPicker.classList.toggle('active'));

  // Freund hinzufügen
  addFriendBtn.addEventListener('click', () => addFriendModal.classList.add('active'));
  document.getElementById('closeFriendModal').addEventListener('click', () => addFriendModal.classList.remove('active'));

  document.getElementById('confirmAddFriend').addEventListener('click', async () => {
    const friendName = friendNameInput.value.trim();
    if (!friendName) return;

    if (friendName.toLowerCase() === currentUser.username.toLowerCase()) {
      alert('Du kannst dich nicht selbst hinzufügen!');
      return;
    }

    try {
      const friendSnap = await getDoc(doc(db, 'users', friendName.toLowerCase()));
      if (!friendSnap.exists()) {
        alert('Benutzer existiert nicht!');
        return;
      }

      await updateDoc(doc(db, 'users', currentUser.username.toLowerCase()), {
        friends: arrayUnion(friendSnap.data().username)
      });

      friendNameInput.value = '';
      addFriendModal.classList.remove('active');
    } catch(err) {
      alert('Fehler beim Hinzufügen: ' + err.message);
    }
  });

  // Gruppe erstellen
  createGroupBtn.addEventListener('click', () => {
    friendsChecklist.innerHTML = '';
    (currentUser.friends || []).forEach(f => {
      const lbl = document.createElement('label');
      lbl.style.fontSize = '0.85rem';
      lbl.style.display = 'flex';
      lbl.style.alignItems = 'center';
      lbl.style.gap = '6px';
      lbl.innerHTML = `<input type="checkbox" value="${f}"> ${f}`;
      friendsChecklist.appendChild(lbl);
    });
    createGroupModal.classList.add('active');
  });

  document.getElementById('closeGroupModal').addEventListener('click', () => createGroupModal.classList.remove('active'));

  document.getElementById('confirmCreateGroup').addEventListener('click', async () => {
    const groupName = groupNameInput.value.trim();
    if (!groupName) return;

    const selectedMembers = [currentUser.username];
    friendsChecklist.querySelectorAll('input:checked').forEach(cb => selectedMembers.push(cb.value));

    try {
      const groupId = `group_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
      await setDoc(doc(db, 'chats', groupId), {
        type: 'group',
        name: groupName,
        members: selectedMembers,
        messages: []
      });

      groupNameInput.value = '';
      createGroupModal.classList.remove('active');
      loadSidebarData();
    } catch(err) {
      alert('Fehler beim Erstellen der Gruppe: ' + err.message);
    }
  });
</script>
</body>
</html>
